{% extends "base.html" %}

{% block title %}编辑待发货订单 - 发货通知系统{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>编辑待发货订单</h2>
    <div class="alert alert-info">
        <i class="bi bi-info-circle me-2"></i>
        您可以修改客户姓名、电话、地址、备注和性别信息。产品信息如有误，请联系管理员处理。
    </div>
    
    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}
    
    <div class="row mt-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5>编辑订单信息</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <!-- 第一行：组别、业务员 -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="group_name" class="form-label">组别</label>
                                <input type="text" class="form-control" value="{{ order.group_name }}" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">业务员</label>
                                <input type="text" class="form-control" value="{{ order.salesman_name or '' }}" readonly>
                            </div>
                        </div>
                        
                        <!-- 第二行：微信名、性别 -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="customer_wechat" class="form-label">微信名</label>
                                <input type="text" class="form-control" id="customer_wechat" name="customer_wechat" value="{{ form_data.customer_wechat if form_data else (order.customer_wechat or '') }}">
                            </div>
                            <div class="col-md-6">
                                <label for="gender" class="form-label">性别</label>
                                <select class="form-select" id="gender" name="gender">
                                    <option value="">请选择（选填）</option>
                                    <option value="男" {% if (form_data and form_data.gender == '男') or (order.gender == '男') %}selected{% endif %}>男</option>
                                    <option value="女" {% if (form_data and form_data.gender == '女') or (order.gender == '女') %}selected{% endif %}>女</option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- 第三行：客户名、电话 -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="customer_name" class="form-label">客户名</label>
                                <input type="text" class="form-control" id="customer_name" name="customer_name" value="{{ form_data.customer_name if form_data else (order.customer_name or '') }}">
                            </div>
                            <div class="col-md-6">
                                <label for="phone" class="form-label">电话 <span class="text-danger">*</span></label>
                                <input type="tel" class="form-control" id="phone" name="phone" pattern="^1[3-9]\d{9}$" required value="{{ form_data.phone if form_data else order.phone }}">
                            </div>
                        </div>
                        
                        <!-- 第四行：已付定金、代收金额 -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="paid_amount" class="form-label">已付定金</label>
                                <input type="text" class="form-control" value="{{ order.paid_amount or '' }}" readonly>
                            </div>
                            <div class="col-md-6">
                                <label for="collect_amount" class="form-label">代收金额</label>
                                <input type="text" class="form-control" value="{{ order.collect_amount or '' }}" readonly>
                            </div>
                        </div>
                        
                        <!-- 第五行：类别、地址 -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="category" class="form-label">类别</label>
                                <input type="text" class="form-control" value="{{ order.category }}" readonly>
                            </div>
                            <div class="col-md-6">
                                <label for="address" class="form-label">地址 <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="address" name="address" rows="1" required>{{ form_data.address if form_data else order.address }}</textarea>
                            </div>
                        </div>
                        
                        <!-- 第六行：快递、单号 -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="express_type" class="form-label">快递</label>
                                <input type="text" class="form-control" id="express_type" name="express_type" value="{{ form_data.express_type if form_data else (order.express_type or '') }}">
                            </div>
                            <div class="col-md-6">
                                <label for="tracking_number" class="form-label">单号</label>
                                <input type="text" class="form-control" id="tracking_number" name="tracking_number" value="{{ form_data.tracking_number if form_data else (order.tracking_number or '') }}">
                            </div>
                        </div>
                        
                        <!-- 第七行：状态 -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">状态</label>
                                <input type="text" class="form-control" value="{{ order.status_text or '' }}" readonly>
                            </div>
                        </div>
                        
                        <!-- 产品信息：单独一行，全宽 -->
                        <div class="row mb-3">
                            <div class="col-12">
                                <div class="card bg-light">
                                    <div class="card-body">
                                        <h6 class="card-title">产品信息（不可修改）</h6>
                                        <p class="card-text text-muted">{{ order.product_info }}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 备注：单独一行，全宽 -->
                        <div class="row mb-4">
                            <div class="col-md-12">
                                <label for="remark" class="form-label">备注</label>
                                <textarea class="form-control" id="remark" name="remark" rows="2" placeholder="填写用户身体情况，如睡眠质量，三高情况">{{ form_data.remark if form_data else (order.remark or '') }}</textarea>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-12">
                                <div class="d-flex gap-3 justify-content-center">
                                    <a href="{{ url_for('orders.dashboard') }}" class="btn btn-secondary px-5">取消</a>
                                    <button type="submit" class="btn btn-primary px-5">保存修改</button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
