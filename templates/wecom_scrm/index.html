{% extends "base.html" %}

{% block title %}企业微信账号托管{% endblock %}

{% block content %}
<style>
    /* 布局 */
    .wecom-layout {
        display: grid;
        grid-template-columns: 320px 1fr 1fr;
        gap: 16px;
        height: calc(100vh - 80px);
        min-height: 600px;
    }
    .wecom-panel {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .panel-header {
        padding: 14px 18px;
        border-bottom: 1px solid #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(135deg, #eff6ff 0%, #f8fafc 100%);
    }
    .panel-header h6 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        color: #1e293b;
    }
    .panel-body {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
    }

    /* 账号卡片 */
    .account-card {
        padding: 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: all .15s;
        background: #fff;
    }
    .account-card:hover { border-color: #3b82f6; box-shadow: 0 2px 8px rgba(59,130,246,.12); }
    .account-card.selected {
        border-color: #3b82f6;
        background: #eff6ff;
    }
    .account-name {
        font-weight: 600;
        color: #1e293b;
        font-size: 14px;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .account-meta { font-size: 12px; color: #64748b; }
    .status-dot {
        width: 8px; height: 8px; border-radius: 50%;
        display: inline-block;
    }
    .status-online { background: #10b981; }
    .status-offline { background: #94a3b8; }
    .status-pending { background: #f59e0b; }
    .status-scanned { background: #3b82f6; }

    /* 按钮 */
    .btn {
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 13px;
        border: none;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #e2e8f0; color: #334155; }
    .btn-secondary:hover { background: #cbd5e1; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-outline {
        background: #fff;
        color: #3b82f6;
        border: 1px solid #3b82f6;
    }
    .btn-outline:hover { background: #eff6ff; }
    .btn-sm { padding: 4px 8px; font-size: 12px; }

    /* 二维码卡片 */
    .qrcode-card {
        text-align: center;
        padding: 20px 16px;
        border: 2px dashed #cbd5e1;
        border-radius: 12px;
        margin-bottom: 14px;
        background: #f8fafc;
    }
    .qrcode-card img {
        max-width: 220px;
        border-radius: 8px;
        background: #fff;
        padding: 10px;
    }
    .qrcode-status {
        margin-top: 12px;
        font-size: 13px;
        font-weight: 500;
    }
    .status-waiting { color: #f59e0b; }
    .status-scanned-info { color: #3b82f6; }
    .status-success-info { color: #10b981; }
    .status-failed-info { color: #ef4444; }

    /* 联系人/群 */
    .contact-item {
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 4px;
    }
    .contact-item:hover { background: #f1f5f9; }
    .contact-item.selected { background: #dbeafe; }
    .contact-avatar {
        width: 36px; height: 36px; border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex; align-items: center; justify-content: center;
        color: white; font-weight: 600; font-size: 14px;
        flex-shrink: 0;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name {
        font-weight: 500; font-size: 14px; color: #1e293b;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .contact-sub { font-size: 12px; color: #64748b; }

    /* 聊天气泡 */
    .chat-bubble {
        max-width: 80%;
        padding: 8px 12px;
        border-radius: 10px;
        margin-bottom: 8px;
        word-break: break-word;
        font-size: 14px;
    }
    .chat-bubble.sent {
        background: #3b82f6;
        color: #fff;
        margin-left: auto;
    }
    .chat-bubble.received {
        background: #f1f5f9;
        color: #334155;
    }
    .chat-input {
        padding: 12px;
        border-top: 1px solid #e5e7eb;
        background: #fff;
        display: flex;
        gap: 8px;
    }
    .chat-input input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
    }
    .chat-input input:focus { border-color: #3b82f6; }

    /* 标签页 */
    .tabs {
        display: flex;
        gap: 4px;
        padding: 4px;
        background: #f1f5f9;
        border-radius: 8px;
        margin-bottom: 12px;
    }
    .tab {
        flex: 1;
        padding: 6px 8px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        text-align: center;
        color: #64748b;
    }
    .tab.active {
        background: #fff;
        color: #1e293b;
        box-shadow: 0 1px 3px rgba(0,0,0,.08);
        font-weight: 500;
    }

    /* 协议信息 */
    .protocol-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        background: #e0e7ff;
        color: #4338ca;
        font-weight: 500;
    }

    /* 空状态 */
    .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #94a3b8;
    }
    .empty-state i {
        font-size: 48px;
        display: block;
        margin-bottom: 10px;
        opacity: .5;
    }

    /* 响应式 */
    @media (max-width: 1200px) {
        .wecom-layout { grid-template-columns: 280px 1fr 1fr; }
    }
    @media (max-width: 900px) {
        .wecom-layout { grid-template-columns: 1fr; height: auto; }
    }
</style>

<div class="container-fluid py-3">
    <div class="mb-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
        <h4 class="mb-0"><i class="bi bi-wechat text-primary me-2"></i>企业微信账号托管</h4>
        <div>
            <span class="protocol-badge" id="protocolBadge">检测中...</span>
            <button class="btn btn-outline btn-sm ms-2" onclick="showProtocolInfo()">
                <i class="bi bi-info-circle"></i> 协议信息
            </button>
        </div>
    </div>

    <div class="wecom-layout">
        <!-- 左：账号管理 -->
        <div class="wecom-panel">
            <div class="panel-header">
                <h6><i class="bi bi-robot me-1"></i>托管账号</h6>
                <div class="d-flex gap-2">
                    <button class="btn btn-primary btn-sm" onclick="startNewLogin()">
                        <i class="bi bi-plus-lg"></i> 添加账号
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="loadAccounts()">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
            </div>
            <div class="panel-body" id="accountsPanel">
                <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
            </div>
        </div>

        <!-- 中：二维码/联系人 -->
        <div class="wecom-panel">
            <div class="panel-header">
                <h6 id="middlePanelTitle"><i class="bi bi-qr-code me-1"></i>扫码登录</h6>
                <span class="protocol-badge" id="sessionBadge" style="display:none;"></span>
            </div>
            <div class="panel-body" id="middlePanel">
                <div class="empty-state">
                    <i class="bi bi-qr-code"></i>
                    <div style="font-size: 14px;">点击「添加账号」开始托管</div>
                    <div style="font-size: 12px; margin-top: 6px;">模拟 iPad 企微 APP 扫码登录</div>
                </div>
            </div>
        </div>

        <!-- 右：消息/聊天 -->
        <div class="wecom-panel">
            <div class="panel-header">
                <h6 id="chatPanelTitle"><i class="bi bi-chat-dots me-1"></i>消息</h6>
            </div>
            <div class="panel-body" id="chatPanel" style="display: flex; flex-direction: column;">
                <div class="empty-state" style="flex: 1;">
                    <i class="bi bi-chat-dots"></i>
                    <div style="font-size: 14px;">请选择联系人开始聊天</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 协议信息 Modal -->
<div class="modal fade" id="protocolModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">协议信息</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="protocolModalBody">
                <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================
// 状态管理
// ============================================================
let state = {
    accounts: [],
    currentAccountId: null,
    currentSession: null,     // { session_id, qrcode, protocol, status, account_id?, contacts?, rooms? }
    pollingInterval: null,
    pollingSessionId: null,
    currentTab: 'contacts',   // contacts | rooms
    currentContact: null,     // 当前选中联系人
    messages: {},             // conversation_id -> [ {type, content} ]
    protocols: null,
    defaultProtocol: 'mock',
};

// ============================================================
// 初始化
// ============================================================
$(document).ready(function() {
    loadProtocolInfo();
    loadAccounts();
});

// ============================================================
// 协议信息
// ============================================================
function loadProtocolInfo() {
    $.get('/admin/wecom-scrm/api/protocols', function(res) {
        if (res && res.success) {
            state.protocols = res.data.protocols;
            state.defaultProtocol = res.data.default;
            updateProtocolBadge();
        }
    });
}
function updateProtocolBadge() {
    const name = state.defaultProtocol;
    const label = { 'ipad': 'iPad 协议（推荐）', 'mock': '模拟协议（未安装 playwright）', 'hook': 'Hook 协议（单账号）' }[name] || name;
    $('#protocolBadge').text(label);
}
function showProtocolInfo() {
    $('#protocolModal').modal('show');
    $.get('/admin/wecom-scrm/api/protocols', function(res) {
        if (!res || !res.success) return;
        const items = res.data.protocols;
        let html = '<div class="alert alert-info small mb-3">';
        html += '<i class="bi bi-lightbulb me-2"></i>';
        html += '<strong>推荐使用 iPad 协议</strong>：纯代码模拟 iPad 浏览器扫码登录，支持无限并发账号，';
        html += '无需安装企业微信客户端。需要 <code>pip install playwright && playwright install chromium</code>。';
        html += '</div>';
        items.forEach(function(p) {
            html += '<div class="card mb-2"><div class="card-body">';
            html += '<div class="d-flex justify-content-between align-items-center">';
            html += '<div><strong>' + p.label + '</strong>';
            html += p.available ? ' <span class="badge bg-success ms-1">可用</span>' : ' <span class="badge bg-secondary">不可用</span>';
            html += '</div></div>';
            html += '<div class="small text-muted mt-1">' + p.description + '</div>';
            html += '</div></div>';
        });
        html += '<div class="small text-muted mt-2">系统统计：' + JSON.stringify(res.data.stats || {}) + '</div>';
        $('#protocolModalBody').html(html);
    });
}

// ============================================================
// 账号列表
// ============================================================
function loadAccounts() {
    $.get('/admin/wecom-scrm/api/accounts', function(res) {
        if (res && res.success) {
            state.accounts = res.data || [];
            renderAccounts();
        }
    });
}
function renderAccounts() {
    const container = document.getElementById('accountsPanel');
    if (!state.accounts || state.accounts.length === 0) {
        container.innerHTML = '<div class="empty-state">'
            + '<i class="bi bi-robot"></i>'
            + '<div style="font-size: 14px;">还没有托管账号</div>'
            + '<button class="btn btn-primary btn-sm mt-3" onclick="startNewLogin()">'
            + '<i class="bi bi-plus-lg me-1"></i>添加账号</button>'
            + '</div>';
        return;
    }
    container.innerHTML = state.accounts.map(function(acc) {
        const status = acc.status || 'offline';
        const statusText = {
            'online': '已在线', 'offline': '离线', 'pending': '扫码中',
            'scanned': '已扫码', 'success': '登录成功', 'failed': '失败'
        }[status] || status;
        const statusCls = {
            'online': 'status-online', 'pending': 'status-pending',
            'scanned': 'status-scanned'
        }[status] || 'status-offline';
        const isSelected = state.currentAccountId === acc.id;
        return `
            <div class="account-card ${isSelected ? 'selected' : ''}" onclick="selectAccount(${acc.id})">
                <div class="account-name">
                    <span class="status-dot ${statusCls}"></span>
                    ${escapeHtml(acc.account_name)}
                </div>
                <div class="account-meta">${escapeHtml(acc.real_name || acc.wecom_alias || '—')}</div>
                <div class="d-flex gap-1 mt-2">
                    <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); selectAccount(${acc.id}); reloadAccountData(${acc.id})">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteAccount(${acc.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        `;
    }).join('');
}
function selectAccount(id) {
    state.currentAccountId = id;
    renderAccounts();
    // 显示账号信息 + 尝试加载联系人（如果有活跃 session）
    const acc = state.accounts.find(function(a) { return a.id === id; });
    if (!acc) return;
    $('#middlePanelTitle').html('<i class="bi bi-person-circle me-1"></i>' + escapeHtml(acc.account_name));
    $('#sessionBadge').text(acc.status || 'offline').show();

    if (acc.has_active_session && acc.session_id) {
        // 已有活跃 session，直接加载联系人
        state.currentSession = { session_id: acc.session_id, account_id: acc.id };
        loadContactsForSession(acc.session_id);
    } else {
        // 没有活跃 session，显示重新登录按钮
        $('#middlePanel').html(`
            <div class="empty-state">
                <i class="bi bi-person-lock"></i>
                <div style="font-size: 14px;">账号：${escapeHtml(acc.account_name)}</div>
                <div style="font-size: 12px; color: #64748b; margin-top: 6px;">当前状态：${escapeHtml(acc.status || '离线')}</div>
                <button class="btn btn-primary btn-sm mt-3" onclick="startNewLoginForAccount(${acc.id})">
                    <i class="bi bi-qr-code me-1"></i>重新扫码登录
                </button>
            </div>
        `);
    }
    clearChat();
}
function deleteAccount(id) {
    if (!confirm('确定要删除这个账号吗？')) return;
    $.ajax({
        url: '/admin/wecom-scrm/api/accounts/' + id,
        method: 'DELETE',
        success: function(res) {
            if (res && res.success) {
                if (state.currentAccountId === id) {
                    state.currentAccountId = null;
                    clearChat();
                }
                loadAccounts();
                showToast('已删除', 'success');
            } else {
                showToast(res.message || '删除失败', 'danger');
            }
        }
    });
}

// ============================================================
// 扫码登录流程
// ============================================================
function startNewLogin() {
    startNewLoginForAccount(null);
}
function startNewLoginForAccount(accountId) {
    stopPolling();
    $('#middlePanelTitle').html('<i class="bi bi-qr-code me-1"></i>扫码登录');
    $('#sessionBadge').hide();
    $('#middlePanel').html(`
        <div class="qrcode-card">
            <div style="padding: 40px 0;"><div class="spinner-border text-primary"></div></div>
            <div class="qrcode-status status-waiting">正在生成二维码...</div>
        </div>
    `);

    const body = { protocol: state.defaultProtocol };
    if (accountId) body.account_id = accountId;

    $.ajax({
        url: '/admin/wecom-scrm/api/login/start',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(body),
        success: function(res) {
            if (!res || !res.success) {
                $('#middlePanel').html(`
                    <div class="empty-state">
                        <i class="bi bi-exclamation-triangle text-warning"></i>
                        <div style="font-size: 14px;">${escapeHtml(res && res.message ? res.message : '登录失败')}</div>
                        <button class="btn btn-primary btn-sm mt-3" onclick="startNewLogin()">重试</button>
                    </div>
                `);
                return;
            }
            const sid = res.data.session_id;
            const qrcode = res.data.qrcode;
            const protocol = res.data.protocol;
            state.currentSession = {
                session_id: sid,
                qrcode: qrcode,
                protocol: protocol,
                status: 'pending',
                contacts: [],
                rooms: [],
            };

            // 展示二维码
            if (qrcode) {
                $('#middlePanel').html(`
                    <div class="qrcode-card">
                        <img src="${qrcode}" alt="扫码登录" style="max-width: 220px;">
                        <div class="qrcode-status status-waiting" id="qrStatus">请使用企业微信扫码登录</div>
                        <div style="font-size: 12px; color: #64748b; margin-top: 4px;">
                            协议：${escapeHtml(protocol)} · Session: ${escapeHtml(sid.substring(0, 8))}...
                        </div>
                    </div>
                    <div class="d-flex justify-content-center">
                        <button class="btn btn-secondary btn-sm" onclick="cancelLogin()">取消</button>
                    </div>
                `);
            } else {
                // hook 协议没有二维码，直接提示
                $('#middlePanel').html(`
                    <div class="qrcode-card">
                        <i class="bi bi-wechat" style="font-size: 80px; color: #07c160;"></i>
                        <div class="qrcode-status status-waiting mt-3">请在企业微信客户端完成登录</div>
                        <div style="font-size: 12px; color: #64748b; margin-top: 4px;">Hook 协议 · Session: ${escapeHtml(sid.substring(0, 8))}...</div>
                    </div>
                    <div class="d-flex justify-content-center">
                        <button class="btn btn-secondary btn-sm" onclick="cancelLogin()">取消</button>
                    </div>
                `);
            }

            // 开始轮询
            startPolling(sid);
        },
        error: function() {
            $('#middlePanel').html('<div class="empty-state"><i class="bi bi-exclamation-triangle text-warning"></i><div style="font-size: 14px;">网络错误</div></div>');
        }
    });
}
function startPolling(sid) {
    state.pollingSessionId = sid;
    state.pollingInterval = setInterval(function() {
        if (state.pollingSessionId !== sid) return;
        $.get('/admin/wecom-scrm/api/login/status/' + sid, function(res) {
            if (!res || !res.success) return;
            const status = res.data.status;
            const info = res.data.login_info || {};
            if (state.currentSession && state.currentSession.session_id === sid) {
                state.currentSession.status = status;
            }

            if (status === 'pending') {
                $('#qrStatus').text('请使用企业微信扫码登录').attr('class', 'qrcode-status status-waiting');
            } else if (status === 'scanned') {
                $('#qrStatus').text('已扫码，等待确认...').attr('class', 'qrcode-status status-scanned-info');
            } else if (status === 'success' || status === 'online') {
                stopPolling();
                const accName = info.name || info.user_id || '企微账号';
                $('#qrStatus').text('登录成功：' + accName).attr('class', 'qrcode-status status-success-info');
                setTimeout(function() {
                    // 登录成功后切换到数据视图
                    if (state.currentSession) {
                        state.currentSession.status = status;
                    }
                    loadAccounts();
                    loadContactsForSession(sid);
                }, 800);
            } else if (status === 'expired') {
                stopPolling();
                $('#qrStatus').text('二维码已过期').attr('class', 'qrcode-status status-failed-info');
            } else if (status === 'failed') {
                stopPolling();
                $('#qrStatus').text('登录失败：' + (res.data.error_msg || '')).attr('class', 'qrcode-status status-failed-info');
            }
        });
    }, 2000);
}
function stopPolling() {
    if (state.pollingInterval) {
        clearInterval(state.pollingInterval);
        state.pollingInterval = null;
    }
    state.pollingSessionId = null;
}
function cancelLogin() {
    const sid = state.pollingSessionId || (state.currentSession && state.currentSession.session_id);
    stopPolling();
    if (sid) {
        $.ajax({
            url: '/admin/wecom-scrm/api/login/close/' + sid,
            method: 'POST',
        });
    }
    $('#middlePanel').html(`
        <div class="empty-state">
            <i class="bi bi-qr-code"></i>
            <div style="font-size: 14px;">已取消</div>
            <button class="btn btn-primary btn-sm mt-3" onclick="startNewLogin()">重新开始</button>
        </div>
    `);
}

// ============================================================
// 联系人/群数据
// ============================================================
function loadContactsForSession(sid) {
    if (!sid) return;
    $('#middlePanelTitle').html('<i class="bi bi-people me-1"></i>联系人 / 群聊');
    $('#sessionBadge').text('online').show();
    $('#middlePanel').html('<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>');

    // 并行拉取联系人 + 群
    $.when(
        $.get('/admin/wecom-scrm/api/sessions/' + sid + '/contacts'),
        $.get('/admin/wecom-scrm/api/sessions/' + sid + '/rooms')
    ).done(function(contactsRes, roomsRes) {
        const contacts = (contactsRes[0] && contactsRes[0].success && contactsRes[0].data) || [];
        const rooms = (roomsRes[0] && roomsRes[0].success && roomsRes[0].data) || [];
        if (state.currentSession) {
            state.currentSession.contacts = contacts;
            state.currentSession.rooms = rooms;
        }
        renderContactList();
    }).fail(function() {
        // 可能 cookie 过期，或 mock 模式
        if (state.currentSession) {
            state.currentSession.contacts = [];
            state.currentSession.rooms = [];
        }
        renderContactList();
    });
}
function reloadAccountData(accountId) {
    // 对已有账号重新登录获取新 session
    startNewLoginForAccount(accountId);
}
function renderContactList() {
    const contacts = (state.currentSession && state.currentSession.contacts) || [];
    const rooms = (state.currentSession && state.currentSession.rooms) || [];
    const container = document.getElementById('middlePanel');

    let tabsHtml = '<div class="tabs">';
    tabsHtml += '<div class="tab ' + (state.currentTab === 'contacts' ? 'active' : '') + '" onclick="switchTab(\'contacts\')">联系人 (' + contacts.length + ')</div>';
    tabsHtml += '<div class="tab ' + (state.currentTab === 'rooms' ? 'active' : '') + '" onclick="switchTab(\'rooms\')">群聊 (' + rooms.length + ')</div>';
    tabsHtml += '</div>';

    let listHtml = '';
    if (state.currentTab === 'contacts') {
        if (contacts.length === 0) {
            listHtml = '<div class="empty-state"><i class="bi bi-person-x"></i><div style="font-size: 13px;">暂无联系人</div><div style="font-size: 11px; color: #94a3b8; margin-top: 4px;">可能需要先扫码登录</div></div>';
        } else {
            listHtml = contacts.map(function(c, idx) {
                const name = c.name || c.user_id || c.conversation_id || ('联系人' + (idx + 1));
                const initial = String(name).charAt(0).toUpperCase();
                const convId = c.conversation_id || c.user_id || c.id || name;
                const isSel = state.currentContact && state.currentContact.conversation_id === convId;
                return `
                    <div class="contact-item ${isSel ? 'selected' : ''}" onclick="selectContact('${escapeJs(convId)}', '${escapeJs(name)}')">
                        <div class="contact-avatar">${escapeHtml(initial)}</div>
                        <div class="contact-info">
                            <div class="contact-name">${escapeHtml(name)}</div>
                            <div class="contact-sub">${escapeHtml(c.corp_name || c.title || '企业微信')}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
    } else {
        if (rooms.length === 0) {
            listHtml = '<div class="empty-state"><i class="bi bi-people"></i><div style="font-size: 13px;">暂无群聊</div></div>';
        } else {
            listHtml = rooms.map(function(r, idx) {
                const name = r.name || ('群聊' + (idx + 1));
                const initial = String(name).charAt(0).toUpperCase();
                const convId = r.conversation_id || r.room_id || r.id || name;
                const isSel = state.currentContact && state.currentContact.conversation_id === convId;
                return `
                    <div class="contact-item ${isSel ? 'selected' : ''}" onclick="selectContact('${escapeJs(convId)}', '${escapeJs(name)}')">
                        <div class="contact-avatar" style="background: linear-gradient(135deg, #10b981, #059669);">${escapeHtml(initial)}</div>
                        <div class="contact-info">
                            <div class="contact-name">${escapeHtml(name)}</div>
                            <div class="contact-sub">${r.member_count ? r.member_count + ' 人' : '群聊'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
    }

    container.innerHTML = tabsHtml + listHtml;
}
function switchTab(tab) {
    state.currentTab = tab;
    renderContactList();
}
function selectContact(convId, name) {
    state.currentContact = { conversation_id: convId, name: name };
    renderContactList();
    renderChat();
}

// ============================================================
// 聊天
// ============================================================
function renderChat() {
    if (!state.currentContact) {
        clearChat();
        return;
    }
    const name = state.currentContact.name;
    const convId = state.currentContact.conversation_id;
    const msgs = state.messages[convId] || [];

    let bubbleHtml = '';
    if (msgs.length === 0) {
        bubbleHtml = '<div class="empty-state" style="padding: 30px 20px;"><i class="bi bi-chat-quote"></i><div style="font-size: 13px;">开始和 ' + escapeHtml(name) + ' 对话</div></div>';
    } else {
        bubbleHtml = msgs.map(function(m) {
            return '<div class="chat-bubble ' + m.type + '">' + escapeHtml(m.content) + '</div>';
        }).join('');
    }

    const chatPanel = document.getElementById('chatPanel');
    chatPanel.innerHTML = `
        <div style="padding: 12px 16px; border-bottom: 1px solid #e5e7eb; font-weight: 600; font-size: 14px;">
            <i class="bi bi-person-circle me-1"></i>${escapeHtml(name)}
        </div>
        <div style="flex: 1; overflow-y: auto; padding: 16px;" id="chatMessages">${bubbleHtml}</div>
        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="输入消息，回车发送..." onkeypress="handleSendKey(event)">
            <button class="btn btn-primary" onclick="sendMessage()">发送</button>
        </div>
    `;
    scrollChatToBottom();
}
function clearChat() {
    const chatPanel = document.getElementById('chatPanel');
    chatPanel.innerHTML = `
        <div class="empty-state" style="flex: 1;">
            <i class="bi bi-chat-dots"></i>
            <div style="font-size: 14px;">请选择联系人开始聊天</div>
        </div>
    `;
    state.currentContact = null;
}
function handleSendKey(e) {
    if (e.key === 'Enter') sendMessage();
}
function sendMessage() {
    if (!state.currentContact || !state.currentSession) {
        showToast('请先选择账号和联系人', 'warning');
        return;
    }
    const input = document.getElementById('msgInput');
    if (!input) return;
    const content = input.value.trim();
    if (!content) return;

    const convId = state.currentContact.conversation_id;
    const sid = state.currentSession.session_id;

    input.value = '';

    // 先本地追加气泡
    if (!state.messages[convId]) state.messages[convId] = [];
    state.messages[convId].push({ type: 'sent', content: content });
    renderChat();

    $.ajax({
        url: '/admin/wecom-scrm/api/sessions/' + sid + '/send',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({
            conversation_id: convId,
            content: content,
            msg_type: 'text'
        }),
        success: function(res) {
            if (!res || !res.success) {
                showToast(res && res.message ? res.message : '发送失败', 'danger');
                // 将发送的消息标记为失败
                state.messages[convId][state.messages[convId].length - 1].content += '（发送失败）';
                renderChat();
            } else {
                showToast('已发送', 'success');
            }
        },
        error: function() {
            showToast('网络错误', 'danger');
        }
    });
}
function scrollChatToBottom() {
    const el = document.getElementById('chatMessages');
    if (el) el.scrollTop = el.scrollHeight;
}

// ============================================================
// 工具
// ============================================================
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = String(text);
    return div.innerHTML;
}
function escapeJs(text) {
    return String(text).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
}
function showToast(message, type) {
    const colors = { success: '#10b981', warning: '#f59e0b', danger: '#ef4444', info: '#3b82f6' };
    const toast = $('<div></div>').css({
        position: 'fixed', top: '20px', right: '20px', zIndex: 9999,
        background: colors[type] || colors.info, color: 'white',
        padding: '8px 16px', borderRadius: '6px', fontSize: '13px',
        boxShadow: '0 4px 12px rgba(0,0,0,.15)',
    }).text(message);
    $('body').append(toast);
    setTimeout(function() { toast.fadeOut(300, function() { $(this).remove(); }); }, 2000);
}
</script>
{% endblock %}
