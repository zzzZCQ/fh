<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业微信SCRM</title>
</head>
<body>
    <div class="container-fluid p-4">
        <div class="row mb-3">
            <div class="col">
                <h4><i class="bi bi-wechat me-2"></i>企业微信扫码登录</h4>
                <p class="text-muted mb-0">使用企业微信扫码登录系统</p>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-qr-code me-2"></i>扫码登录
                    </div>
                    <div class="card-body text-center">
                        <div id="qrcode-area" class="mb-3">
                            <div class="spinner-border text-primary"></div>
                            <p class="text-muted mt-2">正在生成二维码...</p>
                        </div>
                        <div id="status-area" class="alert alert-info">
                            请使用企业微信扫描上方二维码
                        </div>
                        <button class="btn btn-primary" id="refresh-btn" onclick="refreshQRCode()">
                            <i class="bi bi-arrow-clockwise me-2"></i>刷新二维码
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-info-circle me-2"></i>登录说明
                    </div>
                    <div class="card-body">
                        <ol class="mb-0">
                            <li class="mb-2">点击上方"刷新二维码"按钮获取登录二维码</li>
                            <li class="mb-2">打开企业微信手机客户端</li>
                            <li class="mb-2">使用"扫一扫"功能扫描二维码</li>
                            <li class="mb-2">在手机上确认登录</li>
                            <li>登录成功后即可使用系统功能</li>
                        </ol>
                    </div>
                </div>
                
                <div class="card mt-3">
                    <div class="card-header">
                        <i class="bi bi-exclamation-triangle me-2"></i>注意事项
                    </div>
                    <div class="card-body">
                        <ul class="mb-0 small">
                            <li>二维码有效期为5分钟，超时需要刷新</li>
                            <li>请确保企业微信已登录且可正常使用</li>
                            <li>扫码后需在手机上确认登录</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentSessionId = null;
        let pollingInterval = null;
        
        $(document).ready(function() {
            refreshQRCode();
        });
        
        function refreshQRCode() {
            $('#qrcode-area').html('<div class="spinner-border text-primary"></div><p class="text-muted mt-2">正在生成二维码...</p>');
            $('#status-area').attr('class', 'alert alert-info').text('正在生成二维码...');
            
            $.ajax({
                url: '/admin/wecom-scrm/api/qrlogin/create',
                method: 'GET',
                success: function(data) {
                    if (data.success) {
                        currentSessionId = data.data.session_id;
                        $('#qrcode-area').html('<img src="' + data.data.qrcode + '" alt="登录二维码" style="max-width: 256px; border: 2px dashed #cbd5e1; border-radius: 12px; padding: 10px;">');
                        $('#status-area').attr('class', 'alert alert-info').text('请使用企业微信扫描上方二维码');
                        startPolling();
                    } else {
                        $('#qrcode-area').html('<div class="text-danger"><i class="bi bi-x-circle me-2"></i>生成二维码失败</div>');
                        $('#status-area').attr('class', 'alert alert-danger').text('生成二维码失败: ' + data.message);
                    }
                },
                error: function() {
                    $('#qrcode-area').html('<div class="text-danger"><i class="bi bi-x-circle me-2"></i>生成二维码失败</div>');
                    $('#status-area').attr('class', 'alert alert-danger').text('生成二维码失败，请刷新重试');
                }
            });
        }
        
        function startPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
            }
            
            pollingInterval = setInterval(function() {
                if (!currentSessionId) return;
                
                $.ajax({
                    url: '/admin/wecom-scrm/api/qrlogin/status/' + currentSessionId,
                    method: 'GET',
                    success: function(data) {
                        if (data.success) {
                            var status = data.data.status;
                            var statusText = data.data.status_text;
                            
                            switch(status) {
                                case 0: // 等待扫码
                                    $('#status-area').attr('class', 'alert alert-info').text('请使用企业微信扫描上方二维码');
                                    break;
                                case 1: // 已扫码
                                    $('#status-area').attr('class', 'alert alert-warning').text('已扫码，请在手机企业微信中确认登录');
                                    break;
                                case 2: // 登录成功
                                    $('#status-area').attr('class', 'alert alert-success').text('登录成功！');
                                    stopPolling();
                                    
                                    // 获取登录结果
                                    getLoginResult();
                                    break;
                                case 3: // 已过期
                                    $('#status-area').attr('class', 'alert alert-danger').text('二维码已过期，请刷新重试');
                                    stopPolling();
                                    break;
                                case 4: // 登录失败
                                    $('#status-area').attr('class', 'alert alert-danger').text('登录失败，请刷新重试');
                                    stopPolling();
                                    break;
                            }
                        }
                    }
                });
            }, 2000);
        }
        
        function stopPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
        }
        
        function getLoginResult() {
            if (!currentSessionId) return;
            
            $.ajax({
                url: '/admin/wecom-scrm/api/qrlogin/result/' + currentSessionId,
                method: 'GET',
                success: function(data) {
                    if (data.success) {
                        alert('登录成功！账号：' + (data.data.account ? data.data.account.account_name : '未知'));
                        // 可以跳转到其他页面或刷新页面
                        location.reload();
                    }
                }
            });
        }
    </script>
</body>
</html>
