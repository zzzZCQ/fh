{% extends "base.html" %}

{% block title %}业绩管理 - 发货通知系统{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-graph-up me-2"></i>业绩管理</h2>
        <div class="d-flex align-items-center gap-2">
            <select id="yearSelect" class="form-select" style="width: 100px;">
                {% for y in range(2024, now_year + 2) %}
                <option value="{{ y }}" {% if y == now_year %}selected{% endif %}>{{ y }}年</option>
                {% endfor %}
            </select>
            <select id="monthSelect" class="form-select" style="width: 80px;">
                {% for m in range(1, 13) %}
                <option value="{{ m }}" {% if m == now_month %}selected{% endif %}>{{ m }}月</option>
                {% endfor %}
            </select>
            <button id="exportBtn" class="btn btn-success">
                <i class="bi bi-file-earmark-excel me-1"></i>导出业绩报表
            </button>
        </div>
    </div>

    <!-- 概览卡片 -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card bg-primary text-white">
                <div class="card-body">
                    <h6 class="card-title">本月业绩</h6>
                    <h3 id="currentAmount" class="mb-0">-</h3>
                    <small id="currentCount">0 单</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h6 class="card-title">已签收业绩</h6>
                    <h3 id="currentSignedAmount" class="mb-0">-</h3>
                    <small id="currentSignedCount">0 单</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card" id="momCard">
                <div class="card-body">
                    <h6 class="card-title">环比增长</h6>
                    <h3 id="momRate" class="mb-0">-</h3>
                    <small>较上月（已签收）</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card" id="yoyCard">
                <div class="card-body">
                    <h6 class="card-title">同比增长</h6>
                    <h3 id="yoyRate" class="mb-0">-</h3>
                    <small>较去年同期</small>
                </div>
            </div>
        </div>
    </div>

    <!-- 图表区域 -->
    <div class="row mb-4">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">月度业绩趋势</div>
                <div class="card-body">
                    <div id="trendChart" style="height: 300px;"></div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">产品类别分布</div>
                <div class="card-body">
                    <div id="categoryChart" style="height: 300px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 订单列表 -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>本月已签收订单</span>
            <span id="orderCountBadge" class="badge bg-primary">0 单</span>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-sm table-striped">
                    <thead>
                        <tr>
                            <th>订单ID</th>
                            <th>客户名</th>
                            <th>产品类别</th>
                            <th>已付定金</th>
                            <th>代收金额</th>
                            <th>合计金额</th>
                            <th>签收时间</th>
                            <th>快递单号</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody">
                        <tr><td colspan="8" class="text-center text-muted">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 订单详情模态框 -->
    <div class="modal fade" id="orderDetailModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="orderDetailModalTitle">订单详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="orderDetailContent"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentYear = {{ now_year }};
let currentMonth = {{ now_month }};

// 页面加载时获取数据
document.addEventListener('DOMContentLoaded', function() {
    loadData();

    // 年月选择变化时重新加载
    document.getElementById('yearSelect').addEventListener('change', function() {
        currentYear = parseInt(this.value);
        loadData();
    });
    document.getElementById('monthSelect').addEventListener('change', function() {
        currentMonth = parseInt(this.value);
        loadData();
    });

    // 导出业绩报表按钮
    document.getElementById('exportBtn').addEventListener('click', function() {
        const year = currentYear;
        const month = currentMonth;
        
        fetch('/salesman/performance/api/export', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ year, month })
        })
        .then(response => {
            if (response.headers.get('content-type')?.includes('application/json')) {
                return response.json().then(data => Promise.reject(data));
            }
            return response.blob();
        })
        .then(blob => {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `业绩报表_${year}年${month}月.xlsx`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        })
        .catch(data => {
            if (data.message) {
                showToast(data.message, 'danger');
            }
        });
    });
});

function loadData() {
    loadOverview();
    loadTrend();
    loadCategory();
    loadOrders();
}

// 加载概览数据
function loadOverview() {
    fetch(`/salesman/performance/api/overview?year=${currentYear}&month=${currentMonth}`)
        .then(r => r.json())
        .then(data => {
            document.getElementById('currentAmount').textContent = formatMoney(data.current_month.total_amount);
            document.getElementById('currentCount').textContent = data.current_month.total_count + ' 单';
            document.getElementById('currentSignedAmount').textContent = formatMoney(data.current_month.signed_amount);
            document.getElementById('currentSignedCount').textContent = data.current_month.signed_count + ' 单';
            
            const momRate = data.mom_rate;
            document.getElementById('momRate').textContent = (momRate >= 0 ? '+' : '') + momRate + '%';
            document.getElementById('momCard').className = 'card ' + (momRate >= 0 ? 'bg-success text-white' : 'bg-danger text-white');
            
            const yoyRate = data.yoy_rate;
            document.getElementById('yoyRate').textContent = (yoyRate >= 0 ? '+' : '') + yoyRate + '%';
            document.getElementById('yoyCard').className = 'card ' + (yoyRate >= 0 ? 'bg-success text-white' : 'bg-danger text-white');
        });
}

// 加载月度趋势
function loadTrend() {
    fetch(`/salesman/performance/api/monthly_trend?year=${currentYear}&month=${currentMonth}`)
        .then(r => r.json())
        .then(data => {
            const chart = echarts.init(document.getElementById('trendChart'));
            chart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['业绩金额', '订单数'] },
                xAxis: { type: 'category', data: data.months },
                yAxis: [
                    { type: 'value', name: '金额' },
                    { type: 'value', name: '订单数' }
                ],
                series: [
                    { name: '业绩金额', type: 'bar', data: data.amounts, itemStyle: { color: '#0d6efd' } },
                    { name: '订单数', type: 'line', yAxisIndex: 1, data: data.counts, itemStyle: { color: '#198754' } }
                ]
            });
        });
}

// 加载类别分布
function loadCategory() {
    fetch(`/salesman/performance/api/category_distribution?year=${currentYear}&month=${currentMonth}`)
        .then(r => r.json())
        .then(data => {
            const chart = echarts.init(document.getElementById('categoryChart'));
            const pieData = Object.entries(data).map(([name, val]) => ({ name, value: val.amount }));
            chart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    data: pieData,
                    label: { show: true, formatter: '{b}\n{d}%' }
                }]
            });
        });
}

// 加载订单列表
function loadOrders() {
    fetch(`/salesman/performance/api/order_list?year=${currentYear}&month=${currentMonth}`)
        .then(r => r.json())
        .then(data => {
            document.getElementById('orderCountBadge').textContent = data.orders.length + ' 单';
            const tbody = document.getElementById('orderTableBody');
            if (data.orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = data.orders.map(o => `
                <tr style="cursor: pointer;" onclick="showOrderDetail(${o.id})" title="点击查看详情">
                    <td>${o.id}</td>
                    <td>${o.customer_name || '-'}</td>
                    <td>${o.category || '-'}</td>
                    <td>${o.paid_amount || '-'}</td>
                    <td>${o.collect_amount || 0}</td>
                    <td><strong>${formatMoney(o.total_amount)}</strong></td>
                    <td>${o.sign_time || '-'}</td>
                    <td>${o.tracking_number || '-'}</td>
                </tr>
            `).join('');
        });
}

function formatMoney(num) {
    return '¥' + (num || 0).toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

// 显示订单详情（与发货单列表一致）
function showOrderDetail(orderId) {
    fetch('/api/order/' + orderId)
        .then(r => {
            if (!r.ok) return r.json().then(e => { throw new Error(e.error || '加载失败'); });
            return r.json();
        })
        .then(data => {
            if (!data || data.error) {
                document.getElementById('orderDetailContent').innerHTML = '<div class="text-danger">加载订单失败：' + (data?.error || '未知错误') + '</div>';
                new bootstrap.Modal(document.getElementById('orderDetailModal')).show();
                return;
            }

            const statusMap = {'draft': '草稿', 'submitted': '待发货', 'shipped': '已发货'};
            const status = data.status === 'shipped' ? (data.logistics_status || '已发货') : (statusMap[data.status] || data.status);

            document.getElementById('orderDetailContent').innerHTML = `
                <div class="row">
                    <div class="col-md-6">
                        <table class="table table-sm">
                            <tr><th width="100">组别</th><td>${data.group_name}</td></tr>
                            <tr><th>微信名</th><td>${data.customer_wechat || '-'}</td></tr>
                            <tr><th>客户名</th><td>${data.customer_name}</td></tr>
                            <tr><th>已付定金</th><td>${data.paid_amount || '-'}</td></tr>
                            <tr><th>类别</th><td>${data.category}</td></tr>
                            <tr><th>快递</th><td>${data.express_type || '-'}</td></tr>
                            <tr><th>状态</th><td>${status}</td></tr>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <table class="table table-sm">
                            <tr><th width="100">业务员</th><td>${data.salesman_name}</td></tr>
                            <tr><th>性别</th><td>${data.gender || '-'}</td></tr>
                            <tr><th>电话</th><td>${data.phone}</td></tr>
                            <tr><th>代收金额</th><td>${data.collect_amount || '-'}</td></tr>
                            <tr><th>地址</th><td>${data.address}</td></tr>
                            <tr><th>单号</th><td>${data.tracking_number || '-'}</td></tr>
                        </table>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <strong>产品信息：</strong>
                        <div class="border rounded p-2 mt-1 bg-light">${data.product_info || '-'}</div>
                    </div>
                </div>
                ${data.gift_info ? `<div class="row mt-2"><div class="col-12"><strong>赠品信息：</strong><div class="border rounded p-2 mt-1 bg-light">${data.gift_info}</div></div></div>` : ''}
                ${data.remark ? `<div class="row mt-2"><div class="col-12"><strong>备注：</strong><div class="border rounded p-2 mt-1 bg-light">${data.remark}</div></div></div>` : ''}
                <div class="row mt-2">
                    <div class="col-6 text-muted small">创建时间：${data.create_time}</div>
                    <div class="col-6 text-muted small text-end">更新时间：${data.update_time}</div>
                </div>
                <div id="logisticsSection"></div>
            `;

            document.getElementById('orderDetailModalTitle').textContent = '订单详情';
            
            const footer = document.querySelector('#orderDetailModal .modal-footer');
            footer.innerHTML = '<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>';

            new bootstrap.Modal(document.getElementById('orderDetailModal')).show();

            // 已发货订单，加载物流信息
            if (data.status === 'shipped' && data.tracking_number) {
                loadLogistics(data.id);
            }
        })
        .catch(err => {
            document.getElementById('orderDetailContent').innerHTML = '<div class="text-danger">加载订单失败：' + err.message + '</div>';
            new bootstrap.Modal(document.getElementById('orderDetailModal')).show();
        });
}

// 加载物流信息
function loadLogistics(orderId) {
    const section = document.getElementById('logisticsSection');
    section.innerHTML = '<div class="text-center mt-3"><div class="spinner-border spinner-border-sm text-primary"></div> <span class="text-muted">查询物流信息...</span></div>';

    fetch('/api/order/' + orderId + '/logistics')
        .then(r => r.json())
        .then(result => {
            if (result.error) { section.innerHTML = ''; return; }
            const routes = result.routes || [];
            if (routes.length === 0) {
                section.innerHTML = `
                    <div class="text-center mt-3">
                        <div class="text-muted small mb-2">暂无物流信息</div>
                        <button class="btn btn-outline-secondary btn-sm ms-2" onclick="refreshLogistics(${orderId})" title="刷新物流">
                            <i class="bi bi-arrow-clockwise"></i>
                        </button>
                    </div>`;
                return;
            }

            const groups = {};
            routes.forEach(r => {
                const date = (r.acceptTime || '').substring(0, 10);
                if (!groups[date]) groups[date] = [];
                groups[date].push(r);
            });

            const statusMap = {'已签收': 'success', '退回已签收': 'warning', '拒签': 'danger', '派送中': 'warning', '待派送': 'warning', '运送中': 'primary', '已发货': 'info'};
            const statusBadge = statusMap[result.logistics_status] || 'secondary';
            const cacheBadge = result.from_cache ? '<span class="badge bg-secondary ms-1">缓存</span>' : '';

            let html = `
                <div class="mt-3 pt-3 border-top">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="mb-0"><i class="bi bi-truck me-1"></i>物流信息${cacheBadge}</h6>
                        <div>
                            <span class="text-muted small me-2">${result.tracking_number}</span>
                            <span class="badge bg-${statusBadge}">${result.logistics_status || '已发货'}</span>
                            <button class="btn btn-outline-secondary btn-sm ms-2" onclick="refreshLogistics(${orderId})" title="刷新物流">
                                <i class="bi bi-arrow-clockwise"></i>
                            </button>
                        </div>
                    </div>
                    <div style="max-height: 350px; overflow-y: auto; padding-left: 8px;">`;

            const dates = Object.keys(groups).sort().reverse();
            dates.forEach((date, di) => {
                html += `<div class="fw-bold small text-muted mb-2 ${di > 0 ? 'mt-3 pt-2 border-top' : ''}">${date}</div>`;
                const items = groups[date].sort((a, b) => (b.acceptTime || '').localeCompare(a.acceptTime || ''));
                items.forEach((item, idx) => {
                    const time = (item.acceptTime || '').substring(11);
                    const desc = item.remark || '';
                    const isLatest = (di === 0 && idx === 0);
                    html += `
                        <div class="d-flex mb-2" style="font-size: 13px;">
                            <div class="text-nowrap text-muted small me-3" style="width: 70px;">${time}</div>
                            <div class="position-relative" style="padding-left: 20px;">
                                <div class="position-absolute rounded-circle ${isLatest ? 'bg-danger' : 'bg-secondary'}" style="width: 10px; height: 10px; top: 4px; left: 0;"></div>
                                <div class="${isLatest ? 'fw-bold text-dark' : 'text-muted'}">${item.secondaryStatusName || ''}</div>
                                <div class="text-muted small">${desc}</div>
                            </div>
                        </div>`;
                });
            });

            html += '</div></div>';
            section.innerHTML = html;
        })
        .catch(() => { section.innerHTML = '<div class="text-muted text-center mt-3 small">物流查询失败</div>'; });
}

// 刷新物流信息
function refreshLogistics(orderId) {
    const section = document.getElementById('logisticsSection');
    section.innerHTML = '<div class="text-center mt-3"><div class="spinner-border spinner-border-sm text-primary"></div> <span class="text-muted">刷新物流信息...</span></div>';

    fetch('/api/order/' + orderId + '/logistics/refresh', {method: 'POST'})
        .then(r => r.json())
        .then(result => {
            if (result.error) {
                section.innerHTML = '<div class="text-danger text-center mt-3 small">' + result.error + '</div>';
                return;
            }
            loadLogistics(orderId);
        })
        .catch(() => { section.innerHTML = '<div class="text-muted text-center mt-3 small">物流刷新失败</div>'; });
}
</script>
{% endblock %}
