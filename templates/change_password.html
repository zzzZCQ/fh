{% extends "base.html" %}

{% block title %}修改密码 - 发货通知系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4>修改密码</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="old_password" class="form-label">旧密码 <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="old_password" name="old_password" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label">新密码 <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="new_password" name="new_password" minlength="6" required>
                        <div class="form-text">新密码长度至少6位</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">确认修改</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
